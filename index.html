<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Этапы оплат</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="//api.bitrix24.com/api/v1/"></script>
<style>
  :root{
    --bg:#eef2f7;--card:#fff;--border:#e3e8ef;--text:#1b2733;--muted:#8a97a6;
    --blue:#3d6bff;--blue-track:#e8eeff;--green:#3bb86f;
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-size:14px;padding:16px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:13px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 14px}
  .totbar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .totbar .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .totbar .paid{font-size:19px;font-weight:800;color:var(--blue)}
  .totbar .paid.done{color:var(--green)}
  .totbar .of{font-size:13px;color:var(--muted)}
  .bar{height:9px;background:var(--blue-track);border-radius:6px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--blue);transition:width .3s}
  .bar.done>i{background:var(--green)}
  .sec{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .sec-h{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid #f0f3f7}
  .sec-h .nm{flex:1;font-weight:700;font-size:14px;border:none;background:transparent;color:var(--text);padding:2px 4px;border-radius:5px}
  .sec-h .nm:focus{outline:1px solid var(--blue);background:#fafbff}
  .sec-sub{font-size:12px;color:var(--muted);font-weight:500}
  .items{padding:6px 8px}
  .it{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:8px}
  .it:hover{background:#fafbfc}
  .ck{flex:0 0 auto;width:20px;height:20px;border:2px solid #cfd8e3;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff}
  .it.done .ck{background:var(--green);border-color:var(--green)}
  .it .amt{font-weight:700;white-space:nowrap}
  .it.done .desc,.it.done .amt{color:var(--muted);text-decoration:line-through}
  .it .desc{flex:1;min-width:0;color:var(--text)}
  .it.done .desc{text-decoration:line-through}
  .del{flex:0 0 auto;color:#c0c8d2;cursor:pointer;font-size:16px;line-height:1;padding:2px 6px;border-radius:5px}
  .del:hover{color:#e0556b;background:#fff0f2}
  .addrow{padding:8px 12px;border-top:1px solid #f0f3f7;display:flex;gap:8px}
  .addrow input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px}
  .addrow input.amt-in{flex:0 0 120px}
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:600}
  .btn.ghost{background:#eef2ff;color:var(--blue)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .add-sec{width:100%;background:#eef2ff;color:var(--blue);border:1px dashed #c3d0ff;border-radius:10px;padding:11px;font-weight:600;font-size:13px}
  .state{text-align:center;color:var(--muted);padding:40px 10px;font-size:13px}
  .err{background:#fff0f2;border:1px solid #f3c6cd;color:#c0344b;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-bottom:12px;white-space:pre-wrap;word-break:break-word}
  .ver{text-align:center;color:#aeb8c4;font-size:11px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Этапы оплат</h1>
  <div id="err" class="err" style="display:none"></div>
  <div id="root"><div class="state">Загрузка…</div></div>
  <div class="ver" id="ver">v0.1-mvp</div>
</div>

<script>
const API = "https://cadncmmtvjvpevqhaost.supabase.co/functions/v1/api";
const VERSION = "v0.1-mvp";

let ctx = { member_id:null, deal_id:null, user_id:null, user_name:null };
let model = { checklist:null, sections:[], items:[] };

const fmt = n => new Intl.NumberFormat("ru-RU").format(Number(n)||0) + " \u20bd";
const $ = (s,el=document)=>el.querySelector(s);
const showErr = m => { const e=$("#err"); e.style.display="block"; e.textContent="Ошибка: "+m; };
const clearErr = () => { $("#err").style.display="none"; };

async function call(action, extra={}){
  const body = Object.assign({ action, member_id:ctx.member_id, deal_id:ctx.deal_id,
    user_id:ctx.user_id, user_name:ctx.user_name }, extra);
  const r = await fetch(API, { method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify(body) });
  const data = await r.json();
  if(!r.ok || data.error){ throw new Error(data.error || ("HTTP "+r.status)); }
  return data;
}

function totals(){
  let paid=0,total=0;
  for(const it of model.items){ const a=Number(it.amount_raw)||0; total+=a; if(it.done) paid+=a; }
  return { paid,total, pct: total? Math.round(paid/total*100):0 };
}

function render(){
  const root = $("#root");
  const t = totals();
  const done = t.total>0 && t.paid>=t.total;
  let html = `<div class="totbar">
    <div class="row"><span class="paid ${done?'done':''}">${done?'Оплачено полностью':fmt(t.paid)}</span>
    <span class="of">${done?fmt(t.total):'из '+fmt(t.total)}</span></div>
    <div class="bar ${done?'done':''}"><i style="width:${t.pct}%"></i></div>
  </div>`;

  for(const s of model.sections){
    const its = model.items.filter(i=>i.section_id===s.id);
    let sp=0,stot=0; for(const i of its){const a=Number(i.amount_raw)||0;stot+=a;if(i.done)sp+=a;}
    html += `<div class="sec" data-sec="${s.id}">
      <div class="sec-h">
        <input class="nm" value="${esc(s.name)}" data-rename="${s.id}" data-old="${esc(s.name)}">
        <span class="sec-sub">${fmt(sp)} / ${fmt(stot)}</span>
      </div>
      <div class="items">`;
    for(const it of its){
      html += `<div class="it ${it.done?'done':''}" data-item="${it.id}">
        <div class="ck" data-toggle="${it.id}">${it.done?'<svg width="11" height="11" viewBox="0 0 10 10"><path d="M1.5 5.3l2.2 2.2 4.8-5.2" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
        <span class="amt">${fmt(it.amount_raw)}</span>
        <span class="desc">${esc(it.description||'')}</span>
        <span class="del" data-del-item="${it.id}">&times;</span>
      </div>`;
    }
    html += `</div>
      <div class="addrow">
        <input class="amt-in" type="number" placeholder="Сумма" data-amt="${s.id}">
        <input placeholder="Описание этапа" data-desc="${s.id}">
        <button class="btn sm" data-additem="${s.id}">+ Этап</button>
      </div>
    </div>`;
  }
  html += `<button class="add-sec" id="addSec">+ Добавить раздел</button>`;
  root.innerHTML = html;
  bind();
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function bind(){
  const root=$("#root");
  $("#addSec").onclick = async ()=>{
    try{ await call("add_section",{ checklist_id:model.checklist.id, name:"Новый раздел", position:model.sections.length });
      await reload(); }catch(e){ showErr(e.message); }
  };
  root.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=async()=>{
    const id=+el.dataset.toggle; const it=model.items.find(i=>i.id===id); if(!it)return;
    try{ await call("toggle_paid",{ item_id:id, done:!it.done, description:it.description, amount:it.amount_raw });
      await reload(); }catch(e){ showErr(e.message); }
  });
  root.querySelectorAll("[data-additem]").forEach(el=>el.onclick=async()=>{
    const sid=+el.dataset.additem;
    const amt=root.querySelector(`[data-amt="${sid}"]`).value;
    const desc=root.querySelector(`[data-desc="${sid}"]`).value;
    if(!amt && !desc) return;
    const its=model.items.filter(i=>i.section_id===sid);
    try{ await call("add_item",{ section_id:sid, item:{ amount_raw:Math.abs(+amt)||0, description:desc, position:its.length } });
      await reload(); }catch(e){ showErr(e.message); }
  });
  root.querySelectorAll("[data-del-item]").forEach(el=>el.onclick=async()=>{
    const id=+el.dataset.delItem; const it=model.items.find(i=>i.id===id);
    try{ await call("delete_item",{ item_id:id, description:it?.description }); await reload(); }
    catch(e){ showErr(e.message); }
  });
  root.querySelectorAll("[data-rename]").forEach(el=>el.onchange=async()=>{
    const id=+el.dataset.rename; const name=el.value.trim()||"Раздел";
    try{ await call("rename_section",{ section_id:id, name, old_name:el.dataset.old }); el.dataset.old=name; }
    catch(e){ showErr(e.message); }
  });
}

async function reload(){
  clearErr();
  const data = await call("load");
  model = data;
  render();
}

function boot(){
  $("#ver").textContent = VERSION + " · deal " + (ctx.deal_id||"—");
  reload().catch(e=>{ showErr(e.message); $("#root").innerHTML=""; });
}

// ---- Bitrix context init ----
if(window.BX24){
  BX24.init(function(){
    try{
      const auth = BX24.getAuth() || {};
      ctx.member_id = auth.member_id || null;
      // deal id from placement
      let pl = {};
      try{ pl = BX24.placement.info() || {}; }catch(_){}
      ctx.deal_id = (pl.options && (pl.options.ID || pl.options.id)) || null;
      // current user
      BX24.callMethod("user.current",{},function(res){
        const u = res.data && res.data() ? res.data() : (res.answer&&res.answer.result);
        const d = (res.data&&res.data())||{};
        ctx.user_id = d.ID || null;
        ctx.user_name = [d.NAME,d.LAST_NAME].filter(Boolean).join(" ") || null;
        boot();
      });
    }catch(e){ showErr("BX24 init: "+e.message); boot(); }
  });
} else {
  // Standalone preview (outside Bitrix) — show notice.
  showErr("Открыто вне Битрикса — нет контекста сделки. Это нормально для проверки вёрстки.");
  $("#root").innerHTML = '<div class="state">Откройте приложение во вкладке сделки Битрикс24.</div>';
}
</script>
</body>
</html>
