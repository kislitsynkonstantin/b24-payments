<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сводка оплат</title>
<script src="//api.bitrix24.com/api/v1/"></script>
<style>
  :root{
    --border:#e3e8ef;--text:#1b2733;--muted:#8a97a6;
    --blue:#3d6bff;--blue-track:#e8eeff;--green:#3bb86f;--green-track:#e4f6ec;
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:2px 0;color:var(--text);font-size:13px;background:transparent}
  .box{padding:2px 0}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:6px}
  .sum{font-size:17px;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:6px;line-height:1}
  .sum.done{color:var(--green)}
  .sum svg{width:15px;height:15px;flex:0 0 auto}
  .of{font-size:12px;color:var(--muted);white-space:nowrap}
  .bar{height:7px;background:var(--blue-track);border-radius:5px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--blue);border-radius:5px;transition:width .3s}
  .bar.done{background:var(--green-track)}
  .bar.done>i{background:var(--green)}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
  .lbl{font-size:11px;color:var(--muted)}
  .pct{font-weight:800;font-size:13px;color:var(--blue)}
  .pct.done{color:var(--green)}
  .empty{color:var(--muted);font-size:12px;padding:4px 0}
  a.open{font-size:11px;color:var(--blue);text-decoration:none}
  .rest-h{margin-top:10px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .rest-h:hover{color:var(--blue)}
  .rest-h .rc{width:10px;height:10px;flex:0 0 auto;transition:transform .15s}
  .rest-h .rc.col{transform:rotate(-90deg)}
  .rest-h .rest-cnt{margin-left:auto;background:var(--blue-track);color:var(--blue);border-radius:9px;padding:0 6px;font-size:10.5px;font-weight:700}
  .rest{margin-top:5px;display:flex;flex-direction:column;gap:4px}
  .rest-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:12.5px;line-height:1.3}
  .rest-row .d{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rest-row .a{flex:0 0 auto;font-weight:700;color:var(--blue)}
  .rest-total{margin-top:8px;padding-top:8px;border-top:1px dashed #e3e8ef;display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:13px;font-weight:700;color:#e0683b}
  .rest-total .rt-sum{flex:0 0 auto;color:#e0683b}
  .rest-all{margin-top:8px;font-size:12px;color:var(--green);font-weight:600}
</style>
</head>
<body>
<div class="box" id="box"><div class="empty">Загрузка…</div></div>
<script>
const API = "https://cadncmmtvjvpevqhaost.supabase.co/functions/v1/api";
const ICON = {
  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h15a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11"/><circle cx="16.5" cy="12.5" r="1.3" fill="currentColor" stroke="none"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
};
const fmt = n => new Intl.NumberFormat("ru-RU").format(Number(n)||0) + " \u20bd";
let dealId = null;

function fit(){
  if(!window.BX24) return;
  try{
    const h = Math.max(60, document.body.scrollHeight + 4);
    if(BX24.resizeWindow) BX24.resizeWindow(document.body.offsetWidth, h);
  }catch(_){}
}

function paint(paid,total,rest){
  const pct = total? Math.round(paid/total*100):0;
  const done = total>0 && paid>=total;
  const box = document.getElementById("box");
  if(total===0){
    box.innerHTML = '<div class="empty">Этапы оплат не заданы</div>';
    fit(); return;
  }
  let restHtml = '';
  if(done){
    restHtml = '<div class="rest-all">'+ICON.check.replace('width="18" height="18"','')+' Все этапы оплачены</div>';
  } else if(rest && rest.length){
    const collapsed = (localStorage.getItem('paySumCollapsed')==='1');
    const restSum = rest.reduce(function(a,it){ return a+(Number(it.amount)||0); },0);
    const rows = rest.map(function(it){
      return '<div class="rest-row"><span class="d">'+esc(it.desc||'Без названия')+'</span><span class="a">'+fmt(it.amount)+'</span></div>';
    }).join('');
    const caret = '<svg class="rc '+(collapsed?'col':'')+'" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4l4 4 4-4"/></svg>';
    restHtml =
      '<div class="rest-h" id="restToggle">'+caret+'<span>Не оплачено</span><span class="rest-cnt">'+rest.length+'</span></div>'+
      '<div class="rest" id="restList" style="'+(collapsed?'display:none':'')+'">'+rows+'</div>'+
      '<div class="rest-total"><span>Итого не оплачено</span><span class="rt-sum">'+fmt(restSum)+'</span></div>';
  }
  box.innerHTML =
    '<div class="top">'+
      '<span class="sum '+(done?'done':'')+'">'+(done?ICON.check:ICON.wallet)+' '+fmt(done?total:paid)+'</span>'+
      '<span class="of">'+(done?'оплачено полностью':'из '+fmt(total))+'</span>'+
    '</div>'+
    '<div class="bar '+(done?'done':'')+'"><i style="width:'+pct+'%"></i></div>'+
    '<div class="meta"><span class="lbl">Оплачено</span><span class="pct '+(done?'done':'')+'">'+pct+'%</span></div>'+
    restHtml;
  const tgl = document.getElementById('restToggle');
  if(tgl){
    tgl.addEventListener('click', function(){
      const list = document.getElementById('restList');
      const car = tgl.querySelector('.rc');
      const nowCol = list.style.display!=='none';
      list.style.display = nowCol ? 'none' : '';
      if(car) car.classList.toggle('col', nowCol);
      try{ localStorage.setItem('paySumCollapsed', nowCol?'1':'0'); }catch(_){}
      fit();
    });
  }
  fit();
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

async function load(){
  if(!dealId){ paint(0,0); return; }
  try{
    const r = await fetch(API,{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({action:"load",deal_id:dealId,user_id:null,user_name:null})});
    const d = await r.json();
    let paid=0,total=0; const rest=[];
    for(const it of (d.items||[])){
      const a=Number(it.amount_raw)||0; total+=a;
      if(it.done){ paid+=a; }
      else { rest.push({ desc: it.description, amount: a }); }
    }
    paint(paid,total,rest);
  }catch(e){
    document.getElementById("box").innerHTML='<div class="empty">—</div>'; fit();
  }
}

if(window.BX24){
  BX24.init(function(){
    try{
      let pl={};
      try{ pl=BX24.placement.info()||{}; }catch(_){}
      // userfield placement passes ENTITY_VALUE_ID (deal id) in options
      const o = pl.options||{};
      dealId = o.ENTITY_VALUE_ID || o.ID || o.id || (o.ENTITY_ID) || null;
      load();
    }catch(e){ document.getElementById("box").innerHTML='<div class="empty">—</div>'; fit(); }
  });
} else {
  // standalone preview
  paint(2295000,2395000,[{desc:"Финальный платёж",amount:100000}]);
}
</script>
</body>
</html>
